# =============================================================================
# Together AI Configuration
# OptiS Benchmark - Agent Settings
# =============================================================================

agent:
  name: "optis-together"
  version: "1.0.0"
  description: "Together AI Agent"

model:
  provider: "together"
  name: "meta-llama/Llama-3.3-70B-Instruct-Turbo"
  
  # Together AI API Key
  api_key: "${TOGETHER_API_KEY}"
  api_base: "https://api.together.xyz"
  
  # Model Parameters
  temperature: 0.0
  max_tokens: 4096
  top_p: 1.0

system_prompt_file: "prompts/system/optical_agent.txt"

tools:
  enabled:
    - "file_read"
    - "file_write"
    - "python_execute"

execution:
  max_retries: 3
  timeout: 300
  cache_enabled: true
  cache_ttl: 3600

cost_tracking:
  enabled: true
  log_api_usage: true
