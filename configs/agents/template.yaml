# =============================================================================
# Agent Configuration Template
# OptiS Benchmark - Agent Settings
# =============================================================================

# Agent Identity
agent:
  name: "optis-agent"
  version: "1.0.0"
  description: "Optical Design AI Agent"

# Model Configuration
model:
  provider: "openai"          # openai, anthropic, groq, local
  name: "gpt-4-turbo"        # Model name
  api_base: "https://api.openai.com/v1"
  
  # Authentication (use environment variables in production)
  api_key: "${OPENAI_API_KEY}"
  
  # Model Parameters
  temperature: 0.0
  top_p: 1.0
  max_tokens: 4096
  frequency_penalty: 0.0
  presence_penalty: 0.0
  
  # Stop sequences
  stop: null

# System Prompt
system_prompt_file: "prompts/system/optical_agent.txt"

# Tool Configuration
tools:
  enabled:
    - "file_read"
    - "file_write"
    - "bash_execute"
    - "python_execute"
    - "optical_api"
  
  # Optical software integration
  optical_software:
    zemax:
      enabled: true
      connection: "zosapi"     # zosapi, com
      workspace_path: "/tmp/zemax_workspace"
    code_v:
      enabled: false
      connection: "api"
    asap:
      enabled: false

# Execution Settings
execution:
  max_retries: 3
  timeout: 300               # seconds
  cache_enabled: true
  cache_ttl: 3600           # seconds

# Cost Tracking
cost_tracking:
  enabled: true
  log_api_usage: true
