# =============================================================================
# Claude 3 Configuration
# OptiS Benchmark - Agent Settings
# =============================================================================

agent:
  name: "optis-claude3"
  version: "1.0.0"
  description: "Claude 3.5 Sonnet Optical Design Agent"

model:
  provider: "anthropic"
  name: "claude-3-5-sonnet-20241022"
  api_base: "https://api.anthropic.com/v1"
  api_key: "${ANTHROPIC_API_KEY}"
  
  temperature: 0.0
  top_p: 1.0
  max_tokens: 8192
  
  # Claude-specific
  thinking:
    enabled: false
    budget_tokens: 10000

system_prompt_file: "prompts/system/optical_agent.txt"

tools:
  enabled:
    - "file_read"
    - "file_write"
    - "bash_execute"
    - "python_execute"
    - "optical_api"
  
  optical_software:
    zemax:
      enabled: true
      connection: "zosapi"
      workspace_path: "/tmp/zemax_workspace"

execution:
  max_retries: 3
  timeout: 300
  cache_enabled: true
  cache_ttl: 3600

cost_tracking:
  enabled: true
  log_api_usage: true
