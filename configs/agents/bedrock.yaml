# =============================================================================
# AWS Bedrock Configuration (Claude on Bedrock)
# OptiS Benchmark - Agent Settings
# =============================================================================

agent:
  name: "optis-bedrock"
  version: "1.0.0"
  description: "AWS Bedrock Claude Agent"

model:
  provider: "bedrock"
  name: "anthropic.claude-3-5-sonnet-20241022-v1:0"
  
  # AWS credentials via environment variables
  api_key: "${AWS_ACCESS_KEY_ID}"  # Used for credential lookup
  api_base: "us-east-1"  # AWS region
  
  # Model Parameters
  temperature: 0.0
  max_tokens: 8192
  top_p: 1.0

system_prompt_file: "prompts/system/optical_agent.txt"

tools:
  enabled:
    - "file_read"
    - "file_write"
    - "python_execute"

execution:
  max_retries: 3
  timeout: 300
  cache_enabled: true
  cache_ttl: 3600

cost_tracking:
  enabled: true
  log_api_usage: true
