# =============================================================================
# Optical System Analysis Task Configuration
# OptiS Benchmark
# =============================================================================

task:
  id: "system_analysis"
  name: "Optical System Performance Analysis"
  description: "Analyze optical system performance and provide detailed reports"
  category: "system_analysis"
  difficulty: 2
  estimated_time: 10
  tags:
    - "analysis"
    - "performance"
    - "zemax"

dataset:
  path: "dataset/processed/system_analysis.jsonl"
  num_samples: 75
  shuffle: false
  
  format:
    input_field: "system_description"
    output_field: "analysis_report"
    metadata_fields:
      - "task_id"
      - "system_type"
      - "complexity"

environment:
  type: "optical_sandbox"
  
  software:
    required:
      - name: "zemax"
        version: "2023.1+"
      - name: "python"
        version: "3.10+"
  
  sandbox:
    timeout: 300
    max_steps: 50
    memory_limit: "4GB"

evaluation:
  scoring_method: "metric_based"
  
  metrics:
    - name: "analysis_completeness"
      type: "numeric"
      description: "Coverage of required analysis items"
    - name: "metric_accuracy"
      type: "numeric"
      description: "Accuracy of computed optical metrics"
    - name: "report_quality"
      type: "llm_judge"
      description: "Quality of generated analysis report"
  
  success_criteria:
    - metric: "analysis_completeness"
      operator: ">="
      value: 0.85
    - metric: "metric_accuracy"
      operator: ">="
      value: 0.9

prompt:
  system_file: "prompts/system/optical_agent.txt"
  template_file: "prompts/templates/system_analysis.txt"
  
  variables:
    analysis_items:
      - "wavefront_error"
      - "mtf"
      - "spot_diagram"
      - "field_curvature"
      - "distortion"
      - "transmission"
      - "vignetting"

cost:
  max_cost_per_task: 5.0
  budget_per_task: 10.0
