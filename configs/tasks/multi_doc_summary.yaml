# =============================================================================
# Multi-Document Summary Generation Task Configuration
# OptiS Benchmark
# =============================================================================

task:
  id: "multi_doc_summary"
  name: "Multi-Document Summary Generation"
  description: "Generate comprehensive summaries from multiple related documents"
  category: "summarization"
  difficulty: 3
  estimated_time: 15
  tags:
    - "summarization"
    - "multi-document"
    - "synthesis"
    - "academic"

dataset:
  path: "dataset/processed/multi_doc_summary.jsonl"
  num_samples: 50
  shuffle: false
  
  format:
    input_field: "documents"
    output_field: "expected_summary"
    metadata_fields:
      - "task_id"
      - "topic"
      - "num_documents"
      - "total_length"

environment:
  type: "local"
  
  software:
    required:
      - name: "python"
        version: "3.10+"
  
  sandbox:
    timeout: 300
    max_steps: 30
    memory_limit: "4GB"

evaluation:
  scoring_method: "metric_based"
  
  metrics:
    - name: "rouge_l"
      type: "numeric"
      description: "ROUGE-L score against reference summary (0-1)"
    - name: "content_coverage"
      type: "numeric"
      description: "Coverage of key content from source documents (0-1)"
    - name: "coherence"
      type: "numeric"
      description: "Fluency and coherence of summary (0-1)"
    - name: "factuality"
      type: "numeric"
      description: "Factuality of summary (0-1)"
    - name: "redundancy"
      type: "numeric"
      description: "Inversely related to redundancy (0-1, higher=better)"
  
  success_criteria:
    - metric: "content_coverage"
      operator: ">="
      value: 0.7
    - metric: "coherence"
      operator: ">="
      value: 0.8
    - metric: "factuality"
      operator: ">="
      value: 0.9

prompt:
  system_file: "prompts/system/research_agent.txt"
  template_file: "prompts/templates/multi_doc_summary.txt"
  
  variables:
    summary_types:
      - "extractive"
      - "abstractive"
      - "structured"

cost:
  max_cost_per_task: 3.0
  budget_per_task: 8.0
