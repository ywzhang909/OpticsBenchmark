# =============================================================================
# Lens Design Task Configuration
# OptiS Benchmark
# =============================================================================

task:
  id: "lens_design"
  name: "Lens Design Optimization"
  description: "Design and optimize optical lens systems based on specifications"
  category: "lens_design"
  difficulty: 3
  estimated_time: 15
  tags:
    - "lens"
    - "optimization"
    - "zemax"

dataset:
  path: "dataset/processed/lens_design.jsonl"
  num_samples: 50
  shuffle: false
  
  format:
    input_field: "specification"
    output_field: "lens_design"
    metadata_fields:
      - "task_id"
      - "spec_type"
      - "num_elements"

environment:
  type: "optical_sandbox"
  
  software:
    required:
      - name: "zemax"
        version: "2023.1+"
      - name: "python"
        version: "3.10+"
        packages:
          - "zmq"
          - "numpy"
          - "scipy"
  
  sandbox:
    timeout: 600
    max_steps: 100
    memory_limit: "8GB"

evaluation:
  scoring_method: "metric_based"
  
  metrics:
    - name: "mtf_performance"
      type: "numeric"
      description: "Modulation Transfer Function at specified frequencies"
    - name: "spot_size"
      type: "numeric"
      description: "RMS spot size across field"
    - name: "distortion"
      type: "numeric"
      description: "Maximum distortion percentage"
    - name: "transmission"
      type: "numeric"
      description: "System transmission efficiency"
    - name: "design_validity"
      type: "binary"
      description: "Whether design meets basic validity criteria"
  
  success_criteria:
    - metric: "mtf_performance"
      operator: ">="
      value: 0.7
    - metric: "spot_size"
      operator: "<="
      value: 0.05
    - metric: "design_validity"
      operator: "=="
      value: true

prompt:
  system_file: "prompts/system/optical_agent.txt"
  template_file: "prompts/templates/lens_design.txt"
  
  variables:
    domain_knowledge: "optical lens design principles including aberration correction, element spacing, and material selection"

cost:
  max_cost_per_task: 10.0
  budget_per_task: 20.0
